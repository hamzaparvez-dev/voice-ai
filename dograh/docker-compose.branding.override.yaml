# Build UI from source with GenuineStack branding.
# Chatwoot is disabled via branding.ts (useExternalChat: false) — no NEXT_PUBLIC_CHATWOOT_* vars needed.
services:
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: https://voice.genuinestack.com
    image: genuinestack/dograh-ui:local
    pull_policy: never
    environment:
      BACKEND_URL: "${BACKEND_URL:-http://api:8000}"
